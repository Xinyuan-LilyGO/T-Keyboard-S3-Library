name=LILYGO T-Keyboard-S3 Library
version=0.1.0
author=lbuque
maintainer=lbuque <1102390310@qq.com>
sentence=Driver library for LILYGO T-Keyboard-S3
paragraph=Unified driver for the LILYGO T-Keyboard-S3 (ESP32-S3): four GC9107 128x128 IPS displays on a shared SPI bus with per-screen chip-select multiplexing (full LovyanGFX drawing API), and four keys exposed as ButtonSense instances (btn1..btn4) with debounce, click/double-click/hold detection and event callbacks. Access through the global TKeyboardS3 object.
category=Device Control
url=https://github.com/Xinyuan-LilyGO/T-Keyboard-S3
architectures=esp32
depends=LovyanGFX,ButtonSense
includes=TKeyboardS3.h
